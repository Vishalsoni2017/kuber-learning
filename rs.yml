kind: ReplicaSet
apiVersion: apps/v1
metadata:
  name: ngixn-controller

spec:
  replicas: 3
  selector:
    matchLabels:
      env: dev

  template:
    metadata:
      name: nginx-pod
      labels:
        env: dev

    spec:
      containers:
        - name: nginx-pod
          image: nginx
      nodeSelector:
        env: dev